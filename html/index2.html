<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- CSS -->
    <link rel="stylesheet" href="asset/css/resets.css">
    <link rel="stylesheet" href="asset/css/fonts.css">
    <link rel="stylesheet" href="asset/css/style2.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;800;900&display=swap" rel="stylesheet">
</head>
<body>
    
    <header id="header">
        <nav class="nav">
            <div class="ham"><span></span></div>
        </nav>
        <div class="container">
            <div class="logo">Publihser</div>
        </div>
        <div class="scroll">

        </div>
    </header>
    <!-- //header -->

    <section id="contents">
        <section id="section1">
            <div class="container">
                <div class="sec1">
                    <h1>
                        <em class="split">Communicator</em>
                        <em class="split">Good Team Player</em>
                        <em class="split">Gentle Developer</em>
                        <strong class="split">PORTFOLIO</strong>
                    </h1>
                </div>
            </div>
        </section>
        <!-- //section1 -->
        <section id="section2"></section><!-- //section2 -->
        <section id="section3"></section><!-- //section3 -->
        <section id="section4"></section><!-- //section4 -->
        <section id="section5"></section><!-- //section5 -->
        <section id="section6"></section><!-- //section6 -->
    </section>
    <!-- //contents -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js"></script>
    <script>

        document.querySelectorAll(".split").forEach(elem => {
            let splitText = elem.innerText;
            let splitWrap = splitText.split("").join("</span><span aria-hidden:'true'>");
                splitWrap = "<span aria-hidden:'true'>" + splitWrap + "</span>";
            
            elem.innerHTML = splitWrap;
            elem.setAttribute("aria-label", splitText);
        });

        setTimeout(function(){
            let tl = gsap.timeline();
            tl.to(".sec1 h1 em:nth-child(1) span", {duration: 0.4, opacity: 1, y:0, stagger: 0.05})
            tl.to(".sec1 h1 em:nth-child(2) span", {duration: 0.4, opacity: 1, y:0, stagger: 0.05}, "-=0.2")
            tl.to(".sec1 h1 em:nth-child(3) span", {duration: 0.4, opacity: 1, y:0, stagger: 0.05}, "-=0.2")
            tl.to(".sec1 h1 strong span", {duration: 0.4, opacity: 1, stagger: 0.05, y:0,}, "-=0.2")
        },2000);
    </script>
</body>
</html>
